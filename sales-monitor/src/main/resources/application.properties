# ============================================================
# PO Records MCP Server - Application Properties
# ============================================================

spring.application.name=po-mcp-server
server.port=8080

# ============================================================
# Database Configuration - update with your MySQL credentials
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/aibot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ============================================================
# Spring AI MCP Server ? SSE Transport
#
# This exposes two HTTP endpoints that VS Code Copilot uses:
#   GET  http://localhost:8080/sse          ? Copilot subscribes here first
#   POST http://localhost:8080/mcp/message  ? Copilot sends tool calls here
#
# mcp.json must use type "sse" pointing to the /sse endpoint.
# ============================================================

spring.ai.mcp.server.name=po-records-mcp-server
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.description=System Operator for PO Records SQL Query Generation

# CRITICAL: must be SSE for HTTP-based Copilot integration
spring.ai.mcp.server.transport=SSE

# SSE subscribe endpoint (Copilot opens a long-lived GET connection here)
spring.ai.mcp.server.sse-endpoint=/sse

# Message endpoint (Copilot POSTs JSON-RPC tool calls here)
spring.ai.mcp.server.sse-message-endpoint=/mcp/message

# ============================================================
# Logging
# ============================================================
logging.level.com.example.pomcp=DEBUG
logging.level.org.springframework.ai=INFO
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n